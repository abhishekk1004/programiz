<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Lord Ram Sunrise Artwork</title>
  <desc id="desc">Stylized devotional art with Lord Ram silhouette and sunrise.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff2cf"/>
      <stop offset="60%" stop-color="#ffd27f"/>
      <stop offset="100%" stop-color="#ef8c34"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="35%" r="22%">
      <stop offset="0%" stop-color="#fff3b5"/>
      <stop offset="100%" stop-color="#ffb347" stop-opacity="0"/>
