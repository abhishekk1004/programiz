  <path d="M545 340 L500 445 L540 455 L575 370 Z" fill="#5f2500"/>
  <path d="M655 340 L700 455 L660 465 L625 370 Z" fill="#5f2500"/>
  <path d="M575 495 L535 615 L575 615 L603 515 Z" fill="#5f2500"/>
  <path d="M625 495 L665 615 L625 615 L597 515 Z" fill="#5f2500"/>

  <path d="M718 300 Q794 365 718 430" stroke="#5f2500" stroke-width="14" fill="none" stroke-linecap="round"/>
  <line x1="735" y1="365" x2="885" y2="365" stroke="#5f2500" stroke-width="6"/>
  <polygon points="885,365 860,353 860,377" fill="#5f2500"/>

  <text x="600" y="670" text-anchor="middle" font-family="Georgia, serif" font-size="42" fill="#fff4dd" opacity="0.95">Jai Shri Ram</text>
